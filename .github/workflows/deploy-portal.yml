name: Deploy Portal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'devops-knowledge-hub/portal/docs/**'
      - 'devops-knowledge-hub/portal/src/**'
      - 'devops-knowledge-hub/portal/docusaurus.config.ts'
      - 'devops-knowledge-hub/portal/sidebars.ts'
      - 'devops-knowledge-hub/portal/package.json'
      - 'devops-knowledge-hub/frontend/src/**'
      - 'devops-knowledge-hub/frontend/package.json'
      - 'devops-knowledge-hub/frontend/vite.config.js'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual refresh'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus + Admin UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: devops-knowledge-hub/portal/package-lock.json

      # ── Build Docusaurus portal ────────────────────────────────────────────
      - name: Install portal dependencies
        working-directory: devops-knowledge-hub/portal
        run: npm ci

      - name: Build portal
        working-directory: devops-knowledge-hub/portal
        run: npm run build
        env:
          NODE_NO_WARNINGS: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ── Build Admin UI ─────────────────────────────────────────────────────
      - name: Install admin UI dependencies
        working-directory: devops-knowledge-hub/frontend
        run: npm ci

      - name: Build admin UI
        working-directory: devops-knowledge-hub/frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /studyguide-staff-engineer/admin/

      # Place admin UI inside the portal build at /admin/
      - name: Copy admin UI into portal build
        run: |
          mkdir -p devops-knowledge-hub/portal/build/admin
          cp -r devops-knowledge-hub/frontend/dist/. devops-knowledge-hub/portal/build/admin/
          echo "Admin UI files:"
          ls devops-knowledge-hub/portal/build/admin/

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: devops-knowledge-hub/portal/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
